openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Fitness tracking API with AI calorie detection
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: activity
    description: Activity tracking
  - name: food
    description: Food calorie detection
  - name: ai
    description: AI-powered suggestions
  - name: water
    description: Water intake tracking
  - name: analytics
    description: Advanced analytics
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /activity:
    post:
      operationId: createActivity
      tags: [activity]
      summary: Add activity entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityInput"
      responses:
        "201":
          description: Activity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
    get:
      operationId: getActivities
      tags: [activity]
      summary: Get all activity entries
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [day, week, month]
          required: false
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  /activity/summary:
    get:
      operationId: getActivitySummary
      tags: [activity]
      summary: Get aggregated activity summary
      responses:
        "200":
          description: Activity summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivitySummary"

  /activity/goals:
    get:
      operationId: getGoals
      tags: [activity]
      summary: Get user goals
      responses:
        "200":
          description: User goals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goals"
    put:
      operationId: updateGoals
      tags: [activity]
      summary: Update user goals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Goals"
      responses:
        "200":
          description: Updated goals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goals"

  /food/analyze:
    post:
      operationId: analyzeFood
      tags: [food]
      summary: Analyze food image with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FoodAnalyzeInput"
      responses:
        "200":
          description: Food analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodAnalysis"

  /food/log:
    post:
      operationId: logFood
      tags: [food]
      summary: Log a food item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogFoodInput"
      responses:
        "201":
          description: Food logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodLog"
    get:
      operationId: getFoodLogs
      tags: [food]
      summary: Get food logs
      responses:
        "200":
          description: List of food logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodLog"

  /ai/meal-suggestions:
    post:
      operationId: getMealSuggestions
      tags: [ai]
      summary: Get AI meal suggestions based on remaining calories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealSuggestionsInput"
      responses:
        "200":
          description: Meal suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealSuggestionsResponse"

  /ai/workout-recommendations:
    post:
      operationId: getWorkoutRecommendations
      tags: [ai]
      summary: Get AI workout recommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkoutRecommendationsInput"
      responses:
        "200":
          description: Workout recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutRecommendationsResponse"

  /water/log:
    post:
      operationId: logWater
      tags: [water]
      summary: Log water intake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaterLogInput"
      responses:
        "201":
          description: Water logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaterLog"

  /water/today:
    get:
      operationId: getTodayWater
      tags: [water]
      summary: Get today's water intake
      responses:
        "200":
          description: Today's water summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaterSummary"

  /analytics/weekly:
    get:
      operationId: getWeeklyAnalytics
      tags: [analytics]
      summary: Get weekly analytics breakdown by day
      responses:
        "200":
          description: Weekly analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyAnalytics"

  /analytics/streak:
    get:
      operationId: getStreak
      tags: [analytics]
      summary: Get current activity streak
      responses:
        "200":
          description: Streak info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakInfo"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Get admin dashboard data
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/food-logs:
    get:
      operationId: adminGetFoodLogs
      tags: [admin]
      summary: Get all food logs (admin)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All food logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodLog"

  /admin/food-logs/{id}:
    delete:
      operationId: adminDeleteFoodLog
      tags: [admin]
      summary: Delete a food log (admin)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/activities:
    get:
      operationId: adminGetActivities
      tags: [admin]
      summary: Get all activities (admin)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  /admin/activities/{id}:
    delete:
      operationId: adminDeleteActivity
      tags: [admin]
      summary: Delete an activity (admin)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Activity:
      type: object
      properties:
        id:
          type: string
        steps:
          type: number
        caloriesBurned:
          type: number
        date:
          type: string
        note:
          type: string
      required:
        - id
        - steps
        - caloriesBurned
        - date

    CreateActivityInput:
      type: object
      properties:
        steps:
          type: number
        caloriesBurned:
          type: number
        date:
          type: string
        note:
          type: string
      required:
        - steps
        - caloriesBurned

    ActivitySummary:
      type: object
      properties:
        todaySteps:
          type: number
        todayCaloriesBurned:
          type: number
        todayCaloriesConsumed:
          type: number
        weeklySteps:
          type: number
        weeklyCaloriesBurned:
          type: number
        weeklyCaloriesConsumed:
          type: number
        monthlySteps:
          type: number
        recentActivities:
          type: array
          items:
            $ref: "#/components/schemas/Activity"
      required:
        - todaySteps
        - todayCaloriesBurned
        - todayCaloriesConsumed
        - weeklySteps
        - weeklyCaloriesBurned
        - weeklyCaloriesConsumed
        - monthlySteps
        - recentActivities

    Goals:
      type: object
      properties:
        dailySteps:
          type: number
        dailyCaloriesBurned:
          type: number
        dailyCaloriesConsumed:
          type: number
      required:
        - dailySteps
        - dailyCaloriesBurned
        - dailyCaloriesConsumed

    FoodAnalyzeInput:
      type: object
      properties:
        imageBase64:
          type: string
      required:
        - imageBase64

    FoodAnalysis:
      type: object
      properties:
        foodName:
          type: string
        calories:
          type: number
        confidence:
          type: string
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        servingSize:
          type: string
      required:
        - foodName
        - calories
        - confidence

    LogFoodInput:
      type: object
      properties:
        foodName:
          type: string
        calories:
          type: number
        imageBase64:
          type: string
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
      required:
        - foodName
        - calories

    FoodLog:
      type: object
      properties:
        id:
          type: string
        foodName:
          type: string
        calories:
          type: number
        imageBase64:
          type: string
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        mealType:
          type: string
        date:
          type: string
      required:
        - id
        - foodName
        - calories
        - date

    MealSuggestionsInput:
      type: object
      properties:
        remainingCalories:
          type: number
        mealType:
          type: string
        dietaryPreferences:
          type: string
      required:
        - remainingCalories

    MealSuggestion:
      type: object
      properties:
        name:
          type: string
        calories:
          type: number
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        description:
          type: string
        prepTime:
          type: string
      required:
        - name
        - calories
        - description

    MealSuggestionsResponse:
      type: object
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/MealSuggestion"
        tip:
          type: string
      required:
        - suggestions

    WorkoutRecommendationsInput:
      type: object
      properties:
        todaySteps:
          type: number
        weeklySteps:
          type: number
        caloriesBurned:
          type: number
        fitnessLevel:
          type: string
          enum: [beginner, intermediate, advanced]
      required:
        - todaySteps

    WorkoutRecommendation:
      type: object
      properties:
        name:
          type: string
        duration:
          type: string
        calories:
          type: number
        intensity:
          type: string
        description:
          type: string
        steps:
          type: array
          items:
            type: string
      required:
        - name
        - duration
        - description

    WorkoutRecommendationsResponse:
      type: object
      properties:
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutRecommendation"
        motivationalMessage:
          type: string
      required:
        - recommendations
        - motivationalMessage

    WaterLogInput:
      type: object
      properties:
        amount:
          type: number
          description: Amount in ml
      required:
        - amount

    WaterLog:
      type: object
      properties:
        id:
          type: string
        amount:
          type: number
        date:
          type: string
        time:
          type: string
      required:
        - id
        - amount
        - date

    WaterSummary:
      type: object
      properties:
        totalMl:
          type: number
        goalMl:
          type: number
        logs:
          type: array
          items:
            $ref: "#/components/schemas/WaterLog"
        percentage:
          type: number
      required:
        - totalMl
        - goalMl
        - logs
        - percentage

    WeeklyDayData:
      type: object
      properties:
        date:
          type: string
        day:
          type: string
        steps:
          type: number
        caloriesBurned:
          type: number
        caloriesConsumed:
          type: number
      required:
        - date
        - day
        - steps
        - caloriesBurned
        - caloriesConsumed

    WeeklyAnalytics:
      type: object
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyDayData"
        averageSteps:
          type: number
        averageCaloriesBurned:
          type: number
        totalSteps:
          type: number
        bestDay:
          type: string
      required:
        - days
        - averageSteps
        - averageCaloriesBurned
        - totalSteps

    StreakInfo:
      type: object
      properties:
        currentStreak:
          type: number
        longestStreak:
          type: number
        lastActiveDate:
          type: string
        streakDates:
          type: array
          items:
            type: string
      required:
        - currentStreak
        - longestStreak
        - streakDates

    AdminLoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AdminLoginResponse:
      type: object
      properties:
        token:
          type: string
        message:
          type: string
      required:
        - token
        - message

    AdminDashboard:
      type: object
      properties:
        totalActivities:
          type: number
        totalFoodLogs:
          type: number
        totalSteps:
          type: number
        totalCaloriesBurned:
          type: number
        totalCaloriesConsumed:
          type: number
        recentActivities:
          type: array
          items:
            $ref: "#/components/schemas/Activity"
        recentFoodLogs:
          type: array
          items:
            $ref: "#/components/schemas/FoodLog"
      required:
        - totalActivities
        - totalFoodLogs
        - totalSteps
        - totalCaloriesBurned
        - totalCaloriesConsumed
        - recentActivities
        - recentFoodLogs

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
